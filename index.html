<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tebak Kata 5 Huruf</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 20px;
      padding: 30px 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h1 {
      color: #1f2937;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .info {
      font-size: 15px;
      color: #374151;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 25px;
    }

    .cell {
      width: 100%;
      aspect-ratio: 1;
      border: 2px solid #d1d5db;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.6rem;
      font-weight: bold;
      text-transform: uppercase;
      background: white;
      transition: all 0.3s ease;
    }

    .cell.reveal {
      animation: pop 0.35s ease;
    }

    .correct {
      background: #22c55e;
      border-color: #22c55e;
      color: white;
    }

    .present {
      background: #eab308;
      border-color: #eab308;
      color: white;
    }

    .absent {
      background: #ef4444;
      border-color: #ef4444;
      color: white;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 14px;
      border: 2px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      text-transform: uppercase;
      outline: none;
    }

    input:focus {
      border-color: #3b82f6;
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }

    #guessBtn {
      background: #2563eb;
      color: white;
    }

    #guessBtn:hover {
      background: #1d4ed8;
    }

    #resetBtn {
      width: 100%;
      background: #111827;
      color: white;
    }

    #resetBtn:hover {
      background: #000;
    }

    .message {
      min-height: 28px;
      margin-bottom: 15px;
      font-weight: 700;
      color: #111827;
    }

    @keyframes pop {
      0% {
        transform: scale(0.8);
      }
      50% {
        transform: scale(1.08);
      }
      100% {
        transform: scale(1);
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px 18px;
      }

      .cell {
        font-size: 1.3rem;
      }

      .input-group {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Tebak Kata</h1>
    <p class="subtitle">Tebak kata rahasia 5 huruf dalam 5 percobaan</p>

    <div class="info" id="attemptInfo">
      Sisa percobaan: 5
    </div>

    <div class="message" id="message"></div>

    <div class="grid" id="grid"></div>

    <div class="input-group">
      <input
        type="text"
        id="guessInput"
        maxlength="5"
        placeholder="Masukkan 5 huruf"
      >

      <button id="guessBtn">Tebak</button>
    </div>

    <button id="resetBtn">Main Lagi</button>
  </div>

  <script>
    const words = [
      "BUKUH",
      "PANTI",
      "BUNGA",
      "KURSI",
      "MOBIL",
      "PISAU",
      "KOPIA",
      "BAKAR",
      "KUCING",
      "TIKUS"
    ];

    const WORD_LENGTH = 5;
    const MAX_ATTEMPTS = 5;

    let targetWord = "";
    let attempts = [];
    let gameOver = false;

    const grid = document.getElementById("grid");
    const guessInput = document.getElementById("guessInput");
    const guessBtn = document.getElementById("guessBtn");
    const resetBtn = document.getElementById("resetBtn");
    const message = document.getElementById("message");
    const attemptInfo = document.getElementById("attemptInfo");

    function getRandomWord() {
      const validWords = words.filter(
        word => word.length === WORD_LENGTH
      );

      return validWords[
        Math.floor(Math.random() * validWords.length)
      ];
    }

    function createGrid() {
      grid.innerHTML = "";

      for (let i = 0; i < MAX_ATTEMPTS * WORD_LENGTH; i++) {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        grid.appendChild(cell);
      }
    }

    function updateAttemptsInfo() {
      const remaining = MAX_ATTEMPTS - attempts.length;
      attemptInfo.textContent = `Sisa percobaan: ${remaining}`;
    }

    function showMessage(text) {
      message.textContent = text;
    }

    function evaluateGuess(guess, target) {
      const result = Array(WORD_LENGTH).fill("absent");

      const targetChars = target.split("");

      // Pass 1: huruf benar & posisi benar
      for (let i = 0; i < WORD_LENGTH; i++) {
        if (guess[i] === targetChars[i]) {
          result[i] = "correct";
          targetChars[i] = null;
        }
      }

      // Pass 2: huruf ada tapi posisi salah
      for (let i = 0; i < WORD_LENGTH; i++) {
        if (result[i] === "correct") continue;

        const index = targetChars.indexOf(guess[i]);

        if (index !== -1) {
          result[i] = "present";
          targetChars[index] = null;
        }
      }

      return result;
    }

    function renderGuess(guess, result) {
      const row = attempts.length - 1;

      for (let i = 0; i < WORD_LENGTH; i++) {
        const cellIndex = row * WORD_LENGTH + i;
        const cell = grid.children[cellIndex];

        setTimeout(() => {
          cell.textContent = guess[i];
          cell.classList.add(result[i]);
          cell.classList.add("reveal");
        }, i * 150);
      }
    }

    function submitGuess() {
      if (gameOver) return;

      const guess = guessInput.value
        .trim()
        .toUpperCase();

      if (guess.length !== WORD_LENGTH) {
        showMessage("Masukkan tepat 5 huruf.");
        return;
      }

      if (!/^[A-Z]+$/.test(guess)) {
        showMessage("Hanya huruf yang diperbolehkan.");
        return;
      }

      attempts.push(guess);

      const result = evaluateGuess(guess, targetWord);

      renderGuess(guess, result);

      guessInput.value = "";
      updateAttemptsInfo();

      if (guess === targetWord) {
        gameOver = true;

        setTimeout(() => {
          showMessage("🎉 Selamat! Kamu berhasil menebak kata.");
        }, 800);

        return;
      }

      if (attempts.length >= MAX_ATTEMPTS) {
        gameOver = true;

        setTimeout(() => {
          showMessage(
            `😢 Kamu kalah! Kata yang benar adalah "${targetWord}".`
          );
        }, 800);
      }
    }

    function resetGame() {
      targetWord = getRandomWord();
      attempts = [];
      gameOver = false;

      createGrid();
      updateAttemptsInfo();

      showMessage("");

      guessInput.value = "";
      guessInput.focus();

      console.log("Kata rahasia:", targetWord);
    }

    guessBtn.addEventListener("click", submitGuess);

    guessInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        submitGuess();
      }
    });

    guessInput.addEventListener("input", () => {
      guessInput.value = guessInput.value
        .replace(/[^a-zA-Z]/g, "")
        .toUpperCase()
        .slice(0, WORD_LENGTH);
    });

    resetBtn.addEventListener("click", resetGame);

    resetGame();
  </script>

</body>
</html>
